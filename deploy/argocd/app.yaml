apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shin-apps
  namespace: argocd
spec:
  project: shin
  source:
    repoURL: https://github.com/l-furquim/shin.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: shin-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
