image:
  repository: 304361287196.dkr.ecr.us-east-1.amazonaws.com/shin/gateway
  tag: latest

service:
  port: 8080
  containerPort: 8080

resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 1Gi

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
  host: ""
  paths:
    - path: /
      pathType: Prefix

env:
  - name: SPRING_PROFILES_ACTIVE
    value: prod
  - name: CONFIG_SERVER_USERNAME
    valueFrom:
      secretKeyRef:
        name: config-server-creds
        key: username
  - name: CONFIG_SERVER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: config-server-creds
        key: password
  - name: REDIS_HOST
    value: "redis.shin-dev.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: redis-creds
        key: password
  - name: CORS_ALLOWED_ORIGINS
    value: "https://shin.example.com"

envConfig:
  CLOUDFRONT_CDN_URL: "d1bdx17cpz5q2y.cloudfront.net"

serviceAccount:
  create: true
  roleArn: ""
