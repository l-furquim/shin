spring:
  application:
    name: metadata-service
  config:
    import: "optional:configserver:http://config-server:8888"
  cloud:
    config:
      username: ${CONFIG_SERVER_USERNAME:configuser}
      password: ${CONFIG_SERVER_PASSWORD:configpass}

views:
  dedupe-ttl: ${VIEW_DEDUPE_TTL:PT1H}
  flush-interval-ms: ${VIEW_FLUSH_INTERVAL_MS:10000}
  flush-batch-size: ${VIEW_FLUSH_BATCH_SIZE:500}

media:
  thumbnail-base-url: ${THUMBNAIL_BASE_URL:}

